<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Craft | Multi-Splicer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-over { border-color: #3b82f6; background-color: #1e293b; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 p-6 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                PDF Craft 🛠️
            </h1>
            <p class="text-gray-400 text-sm mt-2">Generate multiple custom sliced files from a single PDF instantly</p>
        </header>

        <form id="uploadForm" class="space-y-6">
            <div id="dropZone" class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center cursor-pointer hover:border-gray-500 transition group">
                <input type="file" id="fileInput" accept="application/pdf" class="hidden">
                <div class="space-y-2">
                    <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-blue-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-sm font-medium text-gray-300" id="fileDetails">
                        Drag and drop your source PDF here, or <span class="text-blue-400">browse</span>
                    </p>
                    <p class="text-xs text-gray-500">Only supports standard .pdf files</p>
                </div>
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-semibold mb-2">Target Splicing Ranges</label>
                <div id="rangesContainer" class="space-y-3">
                    <div class="flex items-center space-x-2">
                        <input type="text" name="rangeInput" required placeholder="e.g. 1-4, 7, 10-12" 
                               class="flex-1 bg-gray-700 text-white placeholder-gray-500 rounded-lg px-4 py-2.5 outline-none border border-gray-600 focus:border-blue-500 transition">
                    </div>
                </div>
                
                <button type="button" id="addRangeBtn" class="mt-3 flex items-center text-sm text-blue-400 hover:text-blue-300 font-medium transition focus:outline-none">
                    <span class="mr-1 text-lg font-bold">+</span> Add Another Spliced PDF Range
                </button>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg py-3 transition shadow-lg shadow-blue-900/30 active:scale-[0.99] disabled:bg-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed flex items-center justify-center space-x-2">
                <span id="btnText">Compile & Download Package Bundle (.ZIP)</span>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
